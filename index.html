<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>客户离谱程度鉴定</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;
  background:#0a0a0f;color:#fff;-webkit-font-smoothing:antialiased}
#app{max-width:420px;margin:0 auto;min-height:100vh}

/* 首页 */
.home{padding:48px 24px 40px;text-align:center;
  background:linear-gradient(180deg,#0a0a0f 0%,#1a0a1e 100%)}
.home-badge{display:inline-block;font-size:11px;color:#e879f9;font-weight:600;
  background:rgba(232,121,249,.12);padding:4px 14px;border-radius:20px;margin-bottom:20px;
  border:1px solid rgba(232,121,249,.2)}
.home-title{font-size:28px;font-weight:800;line-height:1.4;margin-bottom:10px;
  background:linear-gradient(135deg,#fff,#e879f9);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.home-desc{font-size:14px;color:#888;line-height:1.8;margin-bottom:24px}

/* 题目区 */
.questions{padding:0 20px 20px}
.q-block{margin-bottom:18px}
.q-label{font-size:14px;font-weight:700;color:#eee;margin-bottom:10px;line-height:1.5}
.q-num{color:#e879f9;margin-right:4px}
.q-opts{display:flex;flex-direction:column;gap:8px}
.q-opt{padding:14px 16px;border-radius:12px;background:rgba(255,255,255,.05);
  border:1.5px solid rgba(255,255,255,.08);font-size:13px;color:#bbb;line-height:1.4;
  cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent}
.q-opt:active{transform:scale(.98)}
.q-opt.selected{border-color:#e879f9;background:rgba(232,121,249,.1);color:#e879f9}

/* 提交 */
.submit-wrap{padding:0 20px 32px}
.submit-btn{display:block;width:100%;padding:16px;border-radius:50px;font-size:16px;
  font-weight:700;border:0;cursor:pointer;-webkit-tap-highlight-color:transparent;
  transition:all .3s;background:#333;color:#666;pointer-events:none}
.submit-btn.active{background:linear-gradient(135deg,#e879f9,#a855f7);color:#0f0f14;
  pointer-events:auto;box-shadow:0 4px 20px rgba(232,121,249,.3)}
.submit-btn.active:active{transform:scale(.97)}

/* 结果页 */
.result{display:none;padding:32px 20px 40px;
  background:linear-gradient(180deg,#0a0a0f 0%,#1a0a1e 50%,#0f0f14 100%);
  animation:fadeUp .5s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}

.res-header{text-align:center;margin-bottom:24px}
.res-emoji{font-size:48px;margin-bottom:6px}
.res-code{font-size:32px;font-weight:900;color:#e879f9;letter-spacing:5px;margin-bottom:6px;
  text-shadow:0 0 30px rgba(232,121,249,.3)}
.res-type{font-size:16px;font-weight:600;color:#ccc;margin-bottom:8px}
.res-tagline{font-size:13px;color:#888;font-style:italic;margin-bottom:16px}
.res-stats{display:flex;justify-content:center;gap:24px}
.res-stat-val{font-size:18px;font-weight:700;color:#e879f9}
.res-stat-label{font-size:11px;color:#666;margin-top:2px}

/* 综述 */
.res-summary{padding:18px;border-radius:16px;background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);margin-bottom:16px}
.res-summary-title{font-size:14px;font-weight:700;color:#e879f9;margin-bottom:10px}
.res-summary-text{font-size:13px;color:#bbb;line-height:1.8}

/* 优劣势 */
.res-pros-cons{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.res-pc-card{padding:14px;border-radius:14px}
.res-pc-card.pros{background:rgba(34,197,94,.06);border:1px solid rgba(34,197,94,.12)}
.res-pc-card.cons{background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.12)}
.res-pc-title{font-size:12px;font-weight:700;margin-bottom:8px}
.res-pc-card.pros .res-pc-title{color:#22c55e}
.res-pc-card.cons .res-pc-title{color:#ef4444}
.res-pc-item{font-size:11px;color:#999;line-height:1.8;padding-left:14px;position:relative}
.res-pc-card.pros .res-pc-item::before{content:'✓';position:absolute;left:0;color:#22c55e;font-weight:700}
.res-pc-card.cons .res-pc-item::before{content:'✗';position:absolute;left:0;color:#ef4444;font-weight:700}

/* 误区 */
.res-pitfall{padding:16px 18px;border-radius:14px;background:rgba(232,121,249,.06);
  border:1px solid rgba(232,121,249,.12);margin-bottom:16px}
.res-pitfall-title{font-size:13px;font-weight:700;color:#e879f9;margin-bottom:8px}
.res-pitfall-item{font-size:12px;color:#aaa;line-height:1.8;padding-left:18px;position:relative}
.res-pitfall-item::before{content:'⚠';position:absolute;left:0}

/* 特征分析 */
.res-traits{padding:20px;border-radius:16px;background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);margin-bottom:16px}
.res-traits-title{font-size:14px;font-weight:700;color:#e879f9;margin-bottom:14px}
.trait{margin-bottom:14px}.trait:last-child{margin-bottom:0}
.trait-top{display:flex;justify-content:space-between;margin-bottom:5px}
.trait-name{font-size:12px;color:#ccc;font-weight:600}
.trait-val{font-size:11px;color:#e879f9;font-weight:700}
.trait-bar{height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden}
.trait-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#e879f9,#a855f7);transition:width 1s ease}
.trait-desc{font-size:11px;color:#777;margin-top:4px;line-height:1.5}

/* 钩子 */
.res-hook{padding:18px;border-radius:14px;
  background:linear-gradient(135deg,rgba(232,121,249,.08),rgba(168,85,247,.04));
  border:1px solid rgba(232,121,249,.15);margin-bottom:16px;text-align:center}
.res-hook-title{font-size:14px;font-weight:700;color:#e879f9;margin-bottom:8px}
.res-hook-text{font-size:13px;color:#aaa;line-height:1.7}
.res-hook-text strong{color:#fff}

/* CTA */
.res-cta{padding:22px 18px;border-radius:18px;background:#e879f9;text-align:center;margin-bottom:16px}
.res-cta-badge{display:inline-block;font-size:10px;font-weight:700;color:#fff;
  background:#ef4444;padding:3px 10px;border-radius:10px;margin-bottom:10px}
.res-cta-title{font-size:17px;font-weight:800;color:#0f0f14;margin-bottom:4px}
.res-cta-sub{font-size:12px;color:rgba(15,15,20,.5);margin-bottom:14px}
.res-cta-list{text-align:left;margin:0 auto 14px;max-width:260px}
.res-cta-item{font-size:12px;color:rgba(15,15,20,.7);line-height:2;padding-left:18px;position:relative}
.res-cta-item::before{content:'✓';position:absolute;left:0;color:#0f0f14;font-weight:700}
.res-cta-qr{width:100px;height:100px;background:#fff;border-radius:12px;margin:0 auto 10px;
  display:flex;align-items:center;justify-content:center;font-size:11px;color:#999}
.res-cta-trust{font-size:11px;color:rgba(15,15,20,.45)}

.res-share{text-align:center;padding:14px 0}
.res-share-btn{display:inline-block;padding:12px 32px;border-radius:50px;font-size:13px;
  font-weight:600;color:#e879f9;background:rgba(232,121,249,.1);border:1px solid rgba(232,121,249,.2);
  cursor:pointer}
.res-share-btn:active{transform:scale(.96)}
.res-foot{text-align:center;font-size:12px;color:#555;padding-bottom:20px}
</style>
</head>
<body>
<div id="app">

  <div id="mainPage">
    <div class="home">
      <span class="home-badge">😤 已有 9,632 人吐槽过</span>
      <h1 class="home-title">客户离谱程度<br>鉴定</h1>
      <p class="home-desc">先想一个让你最头疼的客户 🤔<br>然后回答 4 道题，鉴定 TA 有多离谱 👇</p>
    </div>

    <div class="questions" id="questions"></div>
    <div class="submit-wrap">
      <button class="submit-btn" id="submitBtn">鉴定我的客户</button>
    </div>
  </div>

  <div class="result" id="result"></div>
</div>

<script>
const Qs = [
  { q: "想到这个客户，你脑子里第一个画面是？", opts: [
    { text: "TA在跟你讲价，讲了半小时了", s: {pixiu:3} },
    { text: "TA笑着说\"下次一定找你\"，然后再也没来", s: {zhanan:3} },
    { text: "TA看着你的方案皱眉，说\"差点意思\"但说不出哪不好", s: {wanmei:3} },
    { text: "TA的微信头像——因为你发了三条消息都没回", s: {shuaishou:3} }
  ]},
  { q: "跟这个客户合作之后，最常发生的事是？", opts: [
    { text: "活干完了TA开始砍价，\"能不能再优惠一点\"", s: {pixiu:3} },
    { text: "TA嘴上说支持你，但真要TA配合的时候全变卦", s: {zhanan:3} },
    { text: "改了又改，最后TA说\"还是第一版好\"", s: {wanmei:3} },
    { text: "TA付完钱就消失了，出问题才冒出来说\"你怎么没提醒我\"", s: {shuaishou:3} }
  ]},
  { q: "因为这个客户，你最崩溃的一次是？", opts: [
    { text: "TA把你的报价拿去跟别家比，回来说\"人家便宜一半\"", s: {pixiu:3} },
    { text: "TA说\"放心不会亏待你\"，结果一分钱好处都没见到", s: {zhanan:3} },
    { text: "TA说\"再调一下\"，你已经数不清是第几次了", s: {wanmei:3} },
    { text: "出了问题TA甩锅给你，明明是TA自己没说清楚", s: {shuaishou:3} }
  ]},
  { q: "到了该付钱的时候，这个客户？", opts: [
    { text: "\"再便宜点我马上转\"——TA每次都这么说", s: {pixiu:3} },
    { text: "\"钱的事好说\"——但从来没好说过", s: {zhanan:3} },
    { text: "钱倒是会给，但验收确认能拖一个月", s: {wanmei:3} },
    { text: "你催了三遍没回，第四遍TA说\"最近太忙了\"", s: {shuaishou:3} }
  ]}
];

const TYPES = {
  pixiu: { name:"貔貅型客户", code:"NO PAY", emoji:"💰", pct:41, stars:"★★★★★",
    tagline:"只想占便宜，需求倒是很多",
    summary:"你遇到了最常见也最消耗的客户类型。他的核心逻辑很简单：花最少的钱，享最好的服务。还价是本能，加需求不加钱是习惯，尾款能拖就拖。你对他来说不是合作伙伴，是能压价就压价的供应商。",
    traits:[
      {name:"砍价指数",val:95,desc:"「太贵了」是开场白，「便宜点」是口头禅"},
      {name:"纠结程度",val:45,desc:"不纠结——他很清楚自己就是要最便宜的"},
      {name:"扯皮能力",val:78,desc:"做完了还能找理由砍尾款，「顺手的事」能加十次"},
      {name:"付款态度",val:92,desc:"「马上转」已经说了三周了"}
    ],
    hookTitle:"别气了，全国 41% 的老板都遇到了同款客户",
    hookText:"被客户压价压到没利润，是因为你的客户来源太单一。<br>当你能自己找到更多客户的时候，<strong>你才有底气拒绝不合理的价格</strong>。"
  },
  zhanan: { name:"渣男型客户", code:"BIG PIE", emoji:"🌹", pct:27, stars:"★★★★☆",
    tagline:"嘴上说的都好听，就是不落实",
    summary:"这是最磨人的客户类型。他不会直接为难你，反而特别「客气」——「下次一定找你」「有朋友要推荐给你」「不会亏待你的」。但你等来等去，一次都没兑现。你在他那里排不上号，但他让你以为自己排得上。",
    traits:[
      {name:"砍价指数",val:50,desc:"不算太抠，但承诺的事从来不兑现"},
      {name:"纠结程度",val:60,desc:"其实不纠结，他早就决定了——只是不告诉你"},
      {name:"扯皮能力",val:55,desc:"不正面扯皮，但冷处理你比翻脸还难受"},
      {name:"付款态度",val:70,desc:"不直接赖账，但总有理由延期"}
    ],
    hookTitle:"渣男型客户最大的杀伤力",
    hookText:"让你一直抱有希望，一直等，但永远等不到。<br>做生意最怕的不是被拒绝，是<strong>被吊着</strong>。<br><strong>自己能找到新客户，你就不用等任何人。</strong>"
  },
  wanmei: { name:"纠结型客户", code:"AGAIN", emoji:"🔍", pct:19, stars:"★★★★☆",
    tagline:"永远差一点，但说不出差在哪",
    summary:"这种客户不坏心，但极度消耗你。他自己也不知道要什么，但知道你给的「不太对」。改了八遍他还是觉得「差点感觉」，问他差哪里又说不上来。你的时间和耐心就这样被一点点磨没了。",
    traits:[
      {name:"砍价指数",val:40,desc:"钱倒是给，但你的时间被无限消耗也是一种剥削"},
      {name:"纠结程度",val:97,desc:"全类型最强——改到第 8 版你已经忘了第 1 版什么样"},
      {name:"扯皮能力",val:65,desc:"不算故意扯皮，但他的「再想想」能拖死你"},
      {name:"付款态度",val:35,desc:"付款还行，就是确认/验收遥遥无期"}
    ],
    hookTitle:"纠结型客户消耗的不是你的能力",
    hookText:"是你的时间和耐心。你的精力全耗在一个客户的反复修改里了。<br><strong>当你有更多客户来源，你就不用把所有精力押在一个人身上。</strong>"
  },
  shuaishou: { name:"甩手型客户", code:"NOT ME", emoji:"🫥", pct:13, stars:"★★★★★",
    tagline:"啥都不说清楚，出事全怪你",
    summary:"这是最危险的客户类型。下单的时候「你看着办」「我信任你」，但一旦结果不满意，立刻翻脸——「又不是我让你这么做的」。你不是他的合作伙伴，你是他的背锅侠。平时找不到人，出事秒出现。",
    traits:[
      {name:"砍价指数",val:85,desc:"花最少的钱，但要求最高的结果"},
      {name:"纠结程度",val:25,desc:"不纠结——因为他根本没想过需求是什么"},
      {name:"扯皮能力",val:90,desc:"全类型最强，出了问题永远不是他的责任"},
      {name:"付款态度",val:88,desc:"催三遍不回，第四遍说「最近太忙了」"}
    ],
    hookTitle:"甩手型客户是最危险的一种",
    hookText:"因为你永远不知道他什么时候翻脸。<br>做生意最怕的不是忙，是<strong>被动</strong>。<br><strong>自己掌握客源，才能选择跟谁合作、不跟谁合作。</strong>"
  }
};

const allTypes = ['pixiu','zhanan','wanmei','shuaishou'];
let selected = [null,null,null,null];

// render questions
const qWrap = document.getElementById('questions');
Qs.forEach((q,qi) => {
  const block = document.createElement('div');
  block.className = 'q-block';
  block.innerHTML = `<div class="q-label"><span class="q-num">Q${qi+1}</span>${q.q}</div>
    <div class="q-opts" data-qi="${qi}">${q.opts.map((o,oi) =>
      `<div class="q-opt" data-qi="${qi}" data-oi="${oi}">${o.text}</div>`
    ).join('')}</div>`;
  qWrap.appendChild(block);
});

// option click
document.querySelectorAll('.q-opt').forEach(opt => {
  function pick(e) {
    e.preventDefault();
    const qi = +opt.dataset.qi, oi = +opt.dataset.oi;
    if (selected[qi] === oi) return;
    const wrap = opt.closest('.q-opts');
    wrap.querySelectorAll('.q-opt').forEach(o => o.classList.remove('selected'));
    opt.classList.add('selected');
    selected[qi] = oi;
    checkReady();
  }
  opt.addEventListener('click', pick);
  opt.addEventListener('touchend', e => { e.preventDefault(); pick(e); });
});

function checkReady() {
  const ready = selected.every(s => s !== null);
  document.getElementById('submitBtn').classList.toggle('active', ready);
}

// submit
document.getElementById('submitBtn').addEventListener('click', function() {
  if (!this.classList.contains('active')) return;
  const scores = {pixiu:0,zhanan:0,wanmei:0,shuaishou:0};
  selected.forEach((oi, qi) => {
    const s = Qs[qi].opts[oi].s;
    for (const k in s) scores[k] += s[k];
  });
  // 找最高分，同分随机选
  const maxScore = Math.max(...Object.values(scores));
  const tied = Object.keys(scores).filter(k => scores[k] === maxScore);
  const winner = tied[Math.floor(Math.random() * tied.length)];
  showResult(winner);
});

function showResult(typeKey) {
  document.getElementById('mainPage').style.display = 'none';
  const res = document.getElementById('result');
  const t = TYPES[typeKey];
  res.style.display = 'block';

  const traitRows = t.traits.map(tr =>
    `<div class="trait">
      <div class="trait-top"><span class="trait-name">${tr.name}</span><span class="trait-val">${tr.val}%</span></div>
      <div class="trait-bar"><div class="trait-fill" style="width:0%" data-w="${tr.val}"></div></div>
      <div class="trait-desc">${tr.desc}</div>
    </div>`
  ).join('');

  res.innerHTML = `
    <div class="res-header">
      <div class="res-emoji">${t.emoji}</div>
      <div class="res-code">${t.code}</div>
      <div class="res-type">${t.name}</div>
      <div class="res-tagline">"${t.tagline}"</div>
      <div class="res-stats">
        <div><div class="res-stat-val">${t.pct}%</div><div class="res-stat-label">遇到同款客户</div></div>
        <div><div class="res-stat-val">${t.stars}</div><div class="res-stat-label">离谱指数</div></div>
      </div>
    </div>
    <div class="res-summary">
      <div class="res-summary-title">📝 综合分析</div>
      <div class="res-summary-text">${t.summary}</div>
    </div>
    <div class="res-traits">
      <div class="res-traits-title">📊 客户画像</div>
      ${traitRows}
    </div>
    <div class="res-hook">
      <div class="res-hook-title">💡 ${t.hookTitle}</div>
      <div class="res-hook-text">${t.hookText}</div>
    </div>
    <div class="res-cta">
      <div class="res-cta-title">别让难搞的客户拖垮你</div>
      <div class="res-cta-sub">免费领取一份专属获客方案，自己掌握主动权</div>
      <div class="res-cta-list">
        <div class="res-cta-item">你所在行业的同行获客案例</div>
        <div class="res-cta-item">2026 行业获客趋势与打法</div>
        <div class="res-cta-item">从 0 开始的获客路径规划</div>
        <div class="res-cta-item">一对一顾问免费答疑</div>
      </div>
      <div class="res-cta-qr">二维码</div>
      <div class="res-cta-trust">✅ 全程免费 · ✅ 不推销 · ✅ 随时可删</div>
    </div>
    <div class="res-share"><span class="res-share-btn">😤 让朋友也来鉴定他的客户</span></div>
    <div class="res-foot">已有 9,632 人吐槽过</div>
  `;

  window.scrollTo({top:0,behavior:'smooth'});
  setTimeout(() => {
    res.querySelectorAll('[data-w]').forEach(bar => { bar.style.width = bar.dataset.w + '%'; });
  }, 200);
}
</script>
</body>
</html>
